<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, user-scalable=no">
        <title>DX Server</title>
        <style>
            :root {
                --accent: #f60;
                --accentDark: #fc0;
            }

            * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Courier New", Courier, monospace; font-weight: normal; }
            html, body { height: 100%; width: 100%; }
            body { display: flex; flex-direction: column; justify-content: center; align-items: center; }
            body > *:not(.bg) { margin: 1rem; color: #333; }

            .bg {
                animation: slide 3s ease-in-out infinite alternate;
                background-image: linear-gradient(-45deg, var(--accentDark) 50%, var(--accent) 50%);
                bottom: 0;
                left: -50%;
                opacity: 0.05;
                position: fixed;
                right: -50%;
                top: 0;
                z-index: -1;
            }

            .bg2 {
                animation-direction: alternate-reverse;
                animation-duration: 4s;
            }

            .bg3 {
                animation-duration: 5s;
            }

            @keyframes slide {
                0% {
                    transform: translateX(-25%);
                }
                100% {
                    transform: translateX(25%);
                }
            }
        </style>
    </head>
    <body>
        <h1>DX Server</h1>
        <h2>Start development</h2>
        <h5>Copyright © 2026 <a href="https://okzgn.com">OKZGN</a></h5>

        <div class="bg"></div>
        <div class="bg bg2"></div>
        <div class="bg bg3"></div>
    </body>
</html>
